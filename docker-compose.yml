services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://library_user:library_pass@db:5432/library_db
      JWT_SECRET: dev_secret_key_replace_in_production_min32chars
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "30"
      FIRST_ADMIN_EMAIL: admin@library.com
      FIRST_ADMIN_PASSWORD: Admin@123
      FIRST_ADMIN_NAME: Administrator
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
