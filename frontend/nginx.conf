# Rate-limiting zone for the borrow endpoint.
# Declared in the http block via the include mechanism (this file is included by
# the parent nginx.conf). 10 requests/second per IP; burst of 5 queued requests.
# Prevents a single member from flooding POST /api/borrow and causing DB lock contention.
limit_req_zone $binary_remote_addr zone=borrow_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Borrow endpoint rate limit: max 10 req/s per IP with burst=5 (no delay).
    location /api/borrow {
        limit_req zone=borrow_limit burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
